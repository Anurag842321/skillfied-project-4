<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project 4 Completed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #00ffcc;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            padding: 10px 20px;
            background: #00ffcc;
            color: black;
            border-radius: 25px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        footer {
            margin-top: 20px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 Project 4 Completed 🎉</h1>
        <h2>CI/CD Pipeline Successfully Deployed</h2>
        <p>
            This project demonstrates automated deployment using Jenkins and Docker.
            The pipeline builds, deploys, and verifies the application seamlessly.
        </p>

        <div class="badge">SUCCESS 🚀</div>

        <footer>
            Developed by Anurag Mishra
        </footer>
    </div>

</body>
</html>
